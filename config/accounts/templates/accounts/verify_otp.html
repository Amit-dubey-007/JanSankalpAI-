{% extends "complaints/base.html" %}

{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
    <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">

        <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">
            Verify OTP
        </h2>

        <!-- Messages -->
        {% if messages %}
            <div class="space-y-2 mb-4">
                {% for message in messages %}
                    <div class="rounded-md px-4 py-2 text-sm
                        {% if message.tags == 'error' %}
                            bg-red-100 text-red-700 border border-red-300
                        {% elif message.tags == 'success' %}
                            bg-green-100 text-green-700 border border-green-300
                        {% else %}
                            bg-blue-100 text-blue-700 border border-blue-300
                        {% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <!-- OTP Form -->
        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <input
                type="text"
                name="otp"
                placeholder="Enter OTP"
                required
                class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
            >

            <button
                type="submit"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-3 rounded-lg transition duration-200"
            >
                Verify OTP
            </button>
        </form>

        <!-- Resend OTP -->
        <div class="mt-6 text-center">
            <p class="text-gray-600 text-sm">
                Didn't receive the OTP?
            </p>

            <a href="{% url 'accounts:resend_register_otp' %}"
               class="inline-block mt-2 text-green-600 hover:text-green-700 font-medium hover:underline">
                Resend OTP
            </a>
        </div>

    </div>
</div>

{% endblock %}
