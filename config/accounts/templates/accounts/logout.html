{% extends "complaints/base.html" %}

{% block title %}Logged Out{% endblock %}

{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-100 via-blue-50 to-indigo-100 px-4">

    <div class="max-w-md w-full">

        <div class="bg-white rounded-3xl shadow-2xl border border-slate-200 p-10 text-center">

            <div class="w-20 h-20 mx-auto rounded-full bg-green-100 flex items-center justify-center">

                <svg class="w-10 h-10 text-green-600"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24">

                    <path stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M5 13l4 4L19 7" />

                </svg>

            </div>

            <h1 class="mt-6 text-3xl font-bold text-slate-800">
                Successfully Logged Out
            </h1>

            <p class="mt-3 text-slate-500">
                You have been securely logged out of your account.
                Thank you for using JanSankalp AI.
            </p>

            <a href="{% url 'complaints:public_dashboard' %}"
               class="inline-flex items-center justify-center mt-8 px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold shadow-lg transition">

                Return to Home

            </a>

        </div>

    </div>

</div>

{% endblock %}
