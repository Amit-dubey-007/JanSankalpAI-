{% extends 'complaints/base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">

    <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">

        <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">
            Login
        </h2>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            {% if form.non_field_errors %}
            <div class="bg-red-100 border border-red-400 text-red-700 rounded-md p-3">
                {% for error in form.non_field_errors %}
                    <p>{{ error }}</p>
                {% endfor %}
            </div>
            {% endif %}

            <div>
                <label class="block mb-2 font-medium text-gray-700">
                    Username
                </label>
                <div class="border rounded-lg px-3 py-2 focus-within:ring-2 focus-within:ring-blue-500">
                    {{ form.username }}
                </div>
            </div>

            <div>
                <label class="block mb-2 font-medium text-gray-700">
                    Password
                </label>
                <div class="border rounded-lg px-3 py-2 focus-within:ring-2 focus-within:ring-blue-500">
                    {{ form.password }}
                </div>
            </div>

            <div class="flex justify-end">
                <a href="{% url 'accounts:forgot_password' %}"
                   class="text-sm text-blue-600 hover:text-blue-800 hover:underline">
                    Forgot Password?
                </a>
            </div>

            <button
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition duration-200">
                Login
            </button>

        </form>

        <div class="mt-6 text-center text-gray-600">
            Don't have an account?
            <a href="{% url 'accounts:register' %}"
               class="text-blue-600 font-medium hover:underline">
                Register
            </a>
        </div>

    </div>

</div>
{% endblock %}
