{% extends "complaints/base.html" %}

{% block title %}Logout{% endblock %}

{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-100 via-blue-50 to-indigo-100 px-4">

    <div class="w-full max-w-md">

        <div class="bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">

            <!-- Header -->
            <div class="bg-gradient-to-r from-red-500 to-rose-500 p-8 text-center">

                <div class="w-20 h-20 mx-auto bg-white/20 rounded-full flex items-center justify-center">

                    <svg class="w-10 h-10 text-white"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24">

                        <path stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H9m4 8H7a2 2 0 01-2-2V6a2 2 0 012-2h6" />

                    </svg>

                </div>

                <h1 class="text-3xl font-bold text-white mt-4">
                    Logout
                </h1>

            </div>

            <!-- Body -->
            <div class="p-8 text-center">

                <h2 class="text-2xl font-bold text-slate-800 mb-3">
                    Are you sure?
                </h2>

                <p class="text-slate-500 leading-relaxed">
                    You are about to sign out of your account.
                    You can log in again anytime.
                </p>

                <form method="post" class="mt-8">

                    {% csrf_token %}

                    <button
                        type="submit"
                        class="w-full py-3 rounded-xl bg-red-600 hover:bg-red-700 text-white font-semibold shadow-lg transition duration-300">

                        Yes, Logout

                    </button>

                </form>

                <a href="{% url 'complaints:public_dashboard' %}"
                    class="block mt-4 w-full py-3 rounded-xl border border-slate-300 text-slate-700 hover:bg-slate-100 transition text-center font-medium">

                    Cancel

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
