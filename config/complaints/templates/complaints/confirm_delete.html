{% extends "complaints/base.html" %}

{% block content %}

<div class="max-w-2xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
    <h2 class="text-xl font-semibold text-gray-800 mb-4">Confirm Deletion</h2>
    <p class="text-gray-600 mb-6">Are you sure you want to delete the complaint titled "<strong>{{ complaint.title }}</strong>"? This action cannot be undone.</p>
    
    <form method="post" action="{% url 'complaints:confirm_delete_complaint' complaint.id %}">
        {% csrf_token %}
        <div class="flex justify-between">
            <a href="{% url 'complaints:mycomplaints' %}" class="px-4 py-2 bg-gray-300 text-gray-800 rounded hover:bg-gray-400 transition">Cancel</a>
            <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition">Delete</button>
        </div>
    </form>
</div>


{% endblock %}
