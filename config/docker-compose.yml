version: "3.9"

services:

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  postgres:

    image: postgres:16

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

  redis:

    image: redis:7

    ports:
      - "6379:6379"

  celery:

    build: .

    command: celery -A config worker --pool=solo -l info

    env_file:
      - .env

    depends_on:
      - redis
      - postgres